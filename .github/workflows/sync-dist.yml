name: Sync production dist to main with role SFX

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - .github/workflows/sync-dist.yml
      - src/**
      - assets/voice/**
      - assets/ambience/**
      - scripts/build.mjs
      - package.json
      - package-lock.json

permissions:
  contents: write

concurrency:
  group: sync-dist
  cancel-in-progress: false

jobs:
  build-and-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test
      - name: Build current production app including committed ElevenLabs assets
        run: npm run build
      - name: Verify all ElevenLabs packs reached dist
        run: |
          test -f dist/assets/voice/pack.json
          test -f dist/assets/ambience/pack.json
          test -f dist/assets/role-sfx/pack.json
          echo "Voice, ambience and role SFX manifests are present in dist."
      - name: Commit production dist to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f dist
          if git diff --cached --quiet; then
            echo "dist is already current."
            exit 0
          fi
          git commit -m "Sync production dist with premium role SFX"
          git pull --rebase origin main
          git push
