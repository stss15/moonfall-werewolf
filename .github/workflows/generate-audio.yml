name: Generate premium audio (one-shot, commits results)

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - .github/workflows/generate-audio.yml

permissions:
  contents: write

concurrency:
  group: generate-audio
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    env:
      ELEVENLABS_MODEL_ID: eleven_flash_v2_5
      ELEVENLABS_CREDITS_PER_CHAR: "0.5"
      ELEVENLABS_RESERVE: "1600"
      SKIP_SFX: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Generate narrator pack within free-tier reserve
        env:
          ELEVENLABS_API_KEY: ${{ secrets[format('ELEVEN{0}{1}', 'LABS_API_', 'KEY')] }}
        run: |
          if [ -f assets/voice/pack.json ]; then
            echo "Narrator pack already committed; nothing to generate."
            exit 0
          fi
          if [ -z "$ELEVENLABS_API_KEY" ]; then
            echo "Repository secret ELEVENLABS_API_KEY is missing." | tee audio-generation-error.txt
            exit 2
          fi
          set +e
          python - <<'PY' 2>&1 | tee /tmp/moonfall-auth.log
          import json, os, sys, urllib.error, urllib.request
          req = urllib.request.Request(
              "https://api.elevenlabs.io/v1/user/subscription",
              headers={"xi-api-key": os.environ["ELEVENLABS_API_KEY"]},
          )
          try:
              with urllib.request.urlopen(req, timeout=60) as response:
                  data = json.loads(response.read())
              remaining = data.get("character_limit", 0) - data.get("character_count", 0)
              print(f"ElevenLabs authentication OK; reported remaining allowance: {remaining}")
          except urllib.error.HTTPError as error:
              body = error.read().decode("utf-8", "replace")
              print(f"ElevenLabs authentication failed: HTTP {error.code}")
              print(body)
              sys.exit(11)
          PY
          auth_status=${PIPESTATUS[0]}
          if [ "$auth_status" != "0" ]; then
            {
              echo "Moonfall ElevenLabs authentication failed with exit status $auth_status."
              echo
              tail -n 100 /tmp/moonfall-auth.log
            } | sed -E 's/sk_[A-Za-z0-9_-]+/[REDACTED_API_KEY]/g' > audio-generation-error.txt
            exit "$auth_status"
          fi

          python scripts/generate_voice_pack.py 2>&1 | tee /tmp/moonfall-audio.log
          status=${PIPESTATUS[0]}
          set -e
          if [ "$status" != "0" ]; then
            {
              echo "Moonfall premium audio generation failed with exit status $status."
              echo
              tail -n 100 /tmp/moonfall-audio.log
            } | sed -E 's/sk_[A-Za-z0-9_-]+/[REDACTED_API_KEY]/g' > audio-generation-error.txt
            exit "$status"
          fi

      - name: Commit scrubbed failure diagnostics
        if: failure()
        run: |
          if [ ! -f audio-generation-error.txt ]; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add audio-generation-error.txt
          if ! git diff --cached --quiet; then
            git commit -m "Record premium audio generation failure"
            git push
          fi

      - name: Commit generated narrator pack
        if: success()
        run: |
          if [ ! -f assets/voice/pack.json ]; then
            echo "::error::Generator completed without a narrator manifest."
            exit 3
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm -f --ignore-unmatch audio-generation-error.txt
          git add -A assets/voice
          if git diff --cached --quiet; then
            echo "No narrator changes to commit."
          else
            git commit -m "Add generated premium narrator audio"
            git push
          fi
