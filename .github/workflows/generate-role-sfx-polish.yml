name: Generate role SFX and polish Moonfall audio

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - .github/workflows/generate-role-sfx-polish.yml

permissions:
  contents: write

concurrency:
  group: role-sfx-polish
  cancel-in-progress: true

jobs:
  generate-and-wire:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Generate and immediately commit each missing role SFX
        env:
          ELEVENLABS_API_KEY: ${{ secrets[format('ELEVEN{0}{1}', 'LABS_API_', 'KEY')] }}
        run: |
          set +e
          python scripts/run_role_sfx_remaining_budget.py 2>&1 | tee role-sfx-run.log
          status=${PIPESTATUS[0]}
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add role-sfx-run.log assets/role-sfx/pack.json role-sfx-generation-report.json 2>/dev/null || true
          if ! git diff --cached --quiet; then
            git commit -m "Record role SFX generation result"
            git pull --rebase origin main
            git push
          fi
          exit $status

      - name: Apply narration ducking and role cue wiring
        run: python scripts/patch_audio_polish.py

      - name: Test, build and deploy production dist with role SFX
        run: |
          npm ci
          npm test
          npm run build
          test -f dist/assets/voice/pack.json
          test -f dist/assets/ambience/pack.json
          test -f dist/assets/role-sfx/pack.json
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/app.js src/engine.js src/sw.js
          git add -f dist
          if ! git diff --cached --quiet; then
            git commit -m "Deploy premium role SFX production build"
            git pull --rebase origin main
            git push
          fi
