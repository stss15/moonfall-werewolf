name: Generate role SFX and polish Moonfall audio

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - .github/workflows/generate-role-sfx-polish.yml

permissions:
  contents: write

concurrency:
  group: role-sfx-polish
  cancel-in-progress: true

jobs:
  generate-and-wire:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Generate missing role SFX and commit every successful file to main
        env:
          ELEVENLABS_API_KEY: ${{ secrets[format('ELEVEN{0}{1}', 'LABS_API_', 'KEY')] }}
        run: python scripts/generate_role_sfx_incremental.py

      - name: Apply audio mix and role cue wiring idempotently
        run: python scripts/patch_audio_polish.py

      - name: Test and build current production app
        run: |
          npm ci
          npm test
          npm run build
          test -f dist/assets/voice/pack.json
          test -f dist/assets/ambience/pack.json
          if test -f assets/role-sfx/pack.json; then test -f dist/assets/role-sfx/pack.json; fi

      - name: Commit polished source and finished production build to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/app.js src/engine.js src/sw.js
          git add -f dist
          if git diff --cached --quiet; then
            echo "Audio polish and production dist are already current."
            exit 0
          fi
          git commit -m "Wire premium role SFX and duck ambience under narration"
          git pull --rebase origin main
          git push
