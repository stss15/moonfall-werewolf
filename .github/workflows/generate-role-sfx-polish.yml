name: Generate role SFX and polish Moonfall audio

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - .github/workflows/generate-role-sfx-polish.yml

permissions:
  contents: write

concurrency:
  group: role-sfx-polish
  cancel-in-progress: false

jobs:
  generate-and-wire:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Check live allowance and generate varied role/action SFX
        env:
          ELEVENLABS_API_KEY: ${{ secrets[format('ELEVEN{0}{1}', 'LABS_API_', 'KEY')] }}
        run: |
          python - <<'PY'
          import json
          import os
          import subprocess
          import tempfile
          import time
          import urllib.error
          import urllib.request
          from pathlib import Path

          key = os.environ.get('ELEVENLABS_API_KEY', '')
          if not key:
              raise SystemExit('Repository secret ELEVENLABS_API_KEY is missing')

          pack_path = Path('assets/role-sfx/pack.json')
          if pack_path.exists():
              print('Role SFX pack already exists; refusing to spend credits twice.')
              raise SystemExit(0)

          effects = [
              ('wolves', '01', 4.0, 'Aggressive werewolf pack wake cue, one dominant wolf snarls then unleashes a savage rising howl, two distant wolves answer, dark medieval horror, no music, no speech'),
              ('wolves', '02', 4.0, 'Ferocious close wolf growl erupts into a deep violent howl with a second pack howl behind it, terrifying moonlit forest, cinematic horror sting, no music, no speech'),
              ('wolves', '03', 4.0, 'Three supernatural wolves growling and breathing, sudden brutal alpha howl cuts through the night, threatening and animalistic, short game cue, no music, no speech'),
              ('cupid', '01', 3.0, 'Taut wooden bowstring drawn close, arrow released with a fast air whistle, lands in a magical warm heart shimmer, romantic fantasy game cue, no music, no speech'),
              ('cupid', '02', 3.0, 'Elegant bow draw creak, feathered arrow flies left to right, soft sparkling heart pulse blooms on impact, playful magical love cue, no speech'),
              ('cupid', '03', 3.0, 'Quick cupid arrow launch, bright airy whoosh, two gentle heartbeats and a tender magical chime bloom, whimsical love magic, no music, no speech'),
              ('lovers', '01', 3.0, 'Two soft human heartbeats gradually synchronize, warm magical shimmer joins them, intimate enchanted lovers reveal cue, no speech, no music'),
              ('lovers', '02', 3.0, 'Pair of heartbeats answer each other then beat together, delicate glowing love magic and soft breathy sparkle, fantasy game cue, no speech'),
              ('seer', '01', 3.0, 'Crystal orb awakens with a low glass resonance, ghostly reverse whisper textures swirl, one bright clairvoyant chime reveals a vision, no intelligible speech, no music'),
              ('seer', '02', 3.0, 'Mystical divination cue, crystal singing bowl shimmer, airy spectral whispers with no words, sudden sparkling vision reveal, dark fantasy, no music'),
              ('witch', '01', 3.0, 'Sinister old witch cackle in the distance followed by potion bottle clink and bubbling cauldron, theatrical dark fairy tale cue, no words, no music'),
              ('witch', '02', 3.0, 'Creepy restrained witch laugh, cork pops from potion vial, liquid bubbles and magical fizz rises sharply, short horror game cue, no speech'),
              ('witch', '03', 3.0, 'Low wicked female cackle echoing in a stone room, glass potion bottles rattle, poisonous bubbling hiss, dark fantasy cue, no intelligible words'),
              ('little-girl', '01', 2.5, 'Distant creepy young girl giggle in a dark hallway, one playful breath then silence, haunted but subtle, short horror game cue, no words, no music'),
              ('little-girl', '02', 2.5, 'Soft eerie childlike giggle from behind a door, tiny floorboard creak and a quick hush, unsettling supernatural horror cue, no speech'),
              ('little-girl', '03', 2.5, 'Faint haunted little girl laugh moving from far to near then abruptly stopping, chilling and restrained, no words, no music'),
              ('thief', '01', 2.5, 'Old iron keys quietly jingle, lockpick scrapes inside a medieval lock, tiny click as it opens, stealthy thief game cue, no music, no speech'),
              ('thief', '02', 2.5, 'Leather pouch rustle, two brass keys clink softly, lock mechanism turns and clicks open, secretive medieval thief cue, no speech'),
              ('hunter', '01', 2.5, 'Old hunting musket hammer pulled back with a heavy metallic cock, tense breath, abrupt powerful gunshot with short forest echo, no speech, no music'),
              ('hunter', '02', 2.5, 'Crossbow mechanism cranks and locks, taut string snaps forward with a violent bolt launch and wooden impact, dark medieval hunter cue, no speech'),
              ('death', '01', 4.0, 'Sudden werewolf attack in darkness, terrified adult scream cut short, savage snarling, ripping cloth and wet tearing impact, brief cinematic horror death sting, no music'),
              ('death', '02', 4.0, 'Human gasp turns into a sharp scream as a beast lunges, wolf growl, violent struggle and tearing flesh-like horror sound, ends abruptly, no music, no words'),
              ('death', '03', 4.0, 'Nightmare creature kill sting, panicked scream, heavy body impact, aggressive animal snarl and brutal ripping texture, short dark horror, no music'),
              ('revive', '01', 3.0, 'Dead silence, sudden deep human gasp back to life, desperate inhale and two recovering breaths, faint magical shimmer underneath, resurrection cue, no words, no music'),
              ('revive', '02', 3.0, 'A person jolts awake with a huge gasping breath, lungs refill, heartbeat returns and soft healing magic glows, dramatic revival game cue, no speech'),
              ('revive', '03', 3.0, 'Near silence then sharp life-restoring inhale, relieved breathing and a warm ascending magical pulse, fantasy healing resurrection cue, no words'),
              ('sheriff', '01', 2.0, 'Heavy wooden gavel strike in a village hall, metal sheriff badge lands on a table with a proud bright ring, short authority cue, no speech, no music'),
              ('sheriff', '02', 2.0, 'Single commanding gavel bang, leather and metal badge buckle clinks, dignified village authority sting, no music, no speech'),
              ('judgement', '01', 2.0, 'Three low tense drum hits followed by a heavy wooden verdict knock, ominous village judgement cue, no music melody, no speech'),
              ('judgement', '02', 2.0, 'Slow heartbeat-like thump, tense silence, final deep gavel impact with dark room echo, judgement vote cue, no speech, no music'),
          ]

          now_ms = int(time.time() * 1000)
          usage_payload = {
              'start_time': now_ms - 32 * 24 * 60 * 60 * 1000,
              'end_time': now_ms,
              'interval_seconds': 86400,
          }
          request = urllib.request.Request(
              'https://api.elevenlabs.io/v1/workspace/analytics/query/usage-by-product-over-time',
              data=json.dumps(usage_payload).encode(),
              headers={'xi-api-key': key, 'content-type': 'application/json'},
              method='POST',
          )
          with urllib.request.urlopen(request, timeout=60) as response:
              usage = json.loads(response.read())
          columns = usage.get('columns', [])
          usage_index = columns.index('total_usage')
          credits_used = sum(float(row[usage_index] or 0) for row in usage.get('rows', []))
          estimated_cost = sum(seconds * 10 for _, _, seconds, _ in effects)
          reserve = 2500
          print(f'Actual recent credits used={credits_used:.0f}; planned role SFX estimate={estimated_cost:.0f}; reserve={reserve}')
          if credits_used + estimated_cost > 10000 - reserve:
              raise SystemExit(f'Refusing generation: {credits_used:.0f} used + {estimated_cost:.0f} planned would breach the {reserve}-credit reserve')

          out_dir = Path('assets/role-sfx')
          out_dir.mkdir(parents=True, exist_ok=True)
          manifest = {'version': 1, 'variants': {}}
          report = {'credits_before': credits_used, 'estimated_cost': estimated_cost, 'items': []}

          with tempfile.TemporaryDirectory() as scratch:
              for slot, variant, seconds, prompt in effects:
                  filename = f'{slot}-{variant}.mp3'
                  final = out_dir / filename
                  payload = {
                      'text': prompt,
                      'duration_seconds': seconds,
                      'prompt_influence': 0.55,
                      'loop': False,
                      'model_id': 'eleven_text_to_sound_v2',
                  }
                  generated = None
                  billed = None
                  for attempt in range(1, 6):
                      request = urllib.request.Request(
                          'https://api.elevenlabs.io/v1/sound-generation',
                          data=json.dumps(payload).encode(),
                          headers={'xi-api-key': key, 'content-type': 'application/json'},
                          method='POST',
                      )
                      try:
                          with urllib.request.urlopen(request, timeout=300) as response:
                              generated = response.read()
                              billed = response.headers.get('character-cost')
                          break
                      except urllib.error.HTTPError as error:
                          body = error.read().decode('utf-8', 'replace')[:400]
                          if error.code != 429 or attempt == 5:
                              raise RuntimeError(f'{slot}-{variant} failed HTTP {error.code}: {body}') from error
                          delay = int(error.headers.get('Retry-After') or attempt * 18)
                          print(f'{slot}-{variant}: rate limited; waiting {delay}s before retry {attempt + 1}/5')
                          time.sleep(delay)
                  if not generated or len(generated) < 800:
                      raise RuntimeError(f'{slot}-{variant}: ElevenLabs returned no usable audio')

                  raw = Path(scratch) / f'{slot}-{variant}.raw.mp3'
                  raw.write_bytes(generated)
                  subprocess.run([
                      'ffmpeg', '-hide_banner', '-loglevel', 'error', '-y', '-i', str(raw),
                      '-af', 'highpass=f=45,loudnorm=I=-16:TP=-1.5:LRA=7,alimiter=limit=0.92',
                      '-b:a', '80k', str(final)
                  ], check=True)
                  manifest['variants'].setdefault(slot, []).append(filename)
                  report['items'].append({
                      'slot': slot,
                      'variant': variant,
                      'seconds': seconds,
                      'character_cost_header': billed,
                      'size_bytes': final.stat().st_size,
                  })
                  print(f'✓ {slot}-{variant}: {seconds}s, billing header={billed}, {final.stat().st_size // 1024} KiB')
                  time.sleep(5)

          pack_path.write_text(json.dumps(manifest, indent=2) + '\n')
          Path('role-sfx-generation-report.json').write_text(json.dumps(report, indent=2) + '\n')
          print(f'Generated {len(effects)} role/action SFX variants.')
          PY

      - name: Wire role SFX, duck narration ambience, and tame crickets
        run: |
          python - <<'PY'
          from pathlib import Path

          app = Path('src/app.js')
          text = app.read_text()

          def replace(old, new, label):
              global text
              if old not in text:
                  raise SystemExit(f'Patch target not found: {label}')
              text = text.replace(old, new, 1)

          replace("const premiumLoops = {};\nconst premiumStings = {};", "const premiumLoops = {};\nconst premiumStings = {};\nconst roleSfxVariants = {};", 'role SFX state')
          replace("const APP_VERSION = '2.6.0';", "const APP_VERSION = '2.7.0';", 'app version')

          old_init = """    for (const [slot, file] of Object.entries(data?.stings || {})) {
      SFX_FILES[`sting-${slot}`] = `assets/ambience/${file}`;
      premiumStings[slot] = `sting-${slot}`;
    }
    diagnostic('premium-audio-ready', {loops: Object.keys(premiumLoops), stings: Object.keys(premiumStings)});"""
          new_init = """    for (const [slot, file] of Object.entries(data?.stings || {})) {
      SFX_FILES[`sting-${slot}`] = `assets/ambience/${file}`;
      premiumStings[slot] = `sting-${slot}`;
    }
    const roleResponse = await fetch('assets/role-sfx/pack.json', {cache: 'no-cache'});
    if (roleResponse.ok) {
      const roleData = await roleResponse.json();
      for (const [slot, files] of Object.entries(roleData?.variants || {})) {
        roleSfxVariants[slot] = (Array.isArray(files) ? files : [files]).map((file, index) => {
          const id = `role-${slot}-${index}`;
          SFX_FILES[id] = `assets/role-sfx/${file}`;
          return id;
        });
      }
    }
    diagnostic('premium-audio-ready', {loops: Object.keys(premiumLoops), stings: Object.keys(premiumStings), roleSfx: Object.keys(roleSfxVariants)});"""
          replace(old_init, new_init, 'premium role pack loader')

          replace("function sound(kind = 'tap', delay = 0) {", """function premiumVariant(slot) {
  const variants = roleSfxVariants[slot];
  if (!variants?.length) return null;
  return variants[Math.floor(Math.random() * variants.length)];
}

function sound(kind = 'tap', delay = 0) {""", 'premium variant helper')

          replace("""  try {
    // Generated hero effects replace the procedural versions when present.
    const sting = {howl: ['howl', .5], kill: ['kill', .55], heal: ['heal', .42], victory: ['victory', .5]}[kind];""", """  try {
    const roleSlot = {keys: 'thief', cupid: 'cupid', lovers: 'lovers', seer: 'seer', 'wolf-cue': 'wolves', 'little-girl': 'little-girl', witch: 'witch', kill: 'death', heal: 'revive', hunter: 'hunter', sheriff: 'sheriff', vote: 'judgement'}[kind];
    const roleSample = premiumVariant(roleSlot);
    if (roleSample) {
      const volume = {wolves: .54, death: .5, revive: .42, 'little-girl': .32, cupid: .38, lovers: .32, seer: .34, witch: .4, thief: .35, hunter: .48, sheriff: .36, judgement: .36}[roleSlot] || .4;
      sample(context, roleSample, {at, volume});
      return;
    }
    // Generated hero effects replace the procedural versions when present.
    const sting = {howl: ['howl', .5], kill: ['kill', .55], heal: ['heal', .42], victory: ['victory', .5]}[kind];""", 'role SFX routing')

          replace("""  if (next === 'setup-thief') return sound('keys');
  if (next === 'setup-cupid' || next === 'setup-lovers') return sound('cupid');
  if (next === 'night-seer') return sound('seer');
  if (next === 'night-wolves') return sound('wolf-cue');
  if (next === 'night-witch') return sound('witch');""", """  if (next === 'setup-thief') return sound('keys');
  if (next === 'setup-cupid') return sound('cupid');
  if (next === 'setup-lovers') return sound('lovers');
  if (next === 'night-seer') return sound('seer');
  if (next === 'night-wolves') {
    sound('wolf-cue');
    if (view.settings?.roles?.includes('little-girl')) sound('little-girl', 2.1);
    return;
  }
  if (next === 'night-witch') return sound('witch');""", 'phase role routing')

          replace("""  if (next === 'dawn') {
    const deathAtDawn = Boolean(view.lastDeaths?.length);
    if (deathAtDawn) sound('kill');
    return sound('dawn', deathAtDawn ? .95 : 0);
  }""", """  if (next === 'dawn') {
    const deathAtDawn = Boolean(view.lastDeaths?.length);
    const healedAtDawn = Boolean(view.nightResult?.healed);
    if (deathAtDawn) sound('kill');
    else if (healedAtDawn) sound('heal');
    return sound('dawn', deathAtDawn ? 3.8 : healedAtDawn ? 3.1 : 0);
  }""", 'dawn death/revive audio')

          replace("  if (next === 'day-result') return sound('decision');", """  if (next === 'day-result') {
    if (view.lastDeaths?.length) {
      sound('kill');
      return sound('decision', 3.8);
    }
    return sound('decision');
  }""", 'day execution audio')

          replace("volume: .0065", "volume: .0022", 'procedural cricket volume')

          old_loop = """      const gain = context.createGain();
      const now = context.currentTime;
      gain.gain.setValueAtTime(.0001, now);
      gain.gain.exponentialRampToValueAtTime(kind === 'night' ? .5 : .38, now + 2.5);
      gain.connect(sfxOutput(context));
      const loop = context.createBufferSource();
      loop.buffer = loopBuffer;
      loop.loop = true;
      loop.connect(gain);
      loop.start();
      ambience = {kind, gain, timer: null, stoppables: [loop]};"""
          new_loop = """      const gain = context.createGain();
      const now = context.currentTime;
      const baseGain = kind === 'night' ? .18 : kind === 'day' ? .14 : .15;
      gain.gain.setValueAtTime(.0001, now);
      gain.gain.exponentialRampToValueAtTime(baseGain, now + 2.5);
      gain.connect(sfxOutput(context));
      const loop = context.createBufferSource();
      loop.buffer = loopBuffer;
      loop.loop = true;
      if (kind === 'night') {
        const mellow = context.createBiquadFilter();
        mellow.type = 'lowpass';
        mellow.frequency.value = 2600;
        mellow.Q.value = .45;
        loop.connect(mellow).connect(gain);
      } else {
        loop.connect(gain);
      }
      loop.start();
      ambience = {kind, gain, baseGain, timer: null, stoppables: [loop]};"""
          replace(old_loop, new_loop, 'premium ambience mix')

          replace("gain.gain.exponentialRampToValueAtTime(1, now + 2.5);", "gain.gain.exponentialRampToValueAtTime(.72, now + 2.5);", 'procedural ambience master')
          replace("const state = {kind, gain, timer: null, stoppables: [wind, lfo, drone, droneLfo]};", "const state = {kind, gain, baseGain: .72, timer: null, stoppables: [wind, lfo, drone, droneLfo]};", 'procedural ambience base gain')

          duck = """
function setAmbienceDuck(active) {
  const current = ambience;
  if (!current || !audioContext) return;
  try {
    const now = audioContext.currentTime;
    const baseGain = current.baseGain ?? 1;
    const target = active ? Math.max(.012, baseGain * .11) : baseGain;
    current.gain.gain.cancelScheduledValues(now);
    current.gain.gain.setTargetAtTime(target, now, active ? .07 : .38);
  } catch { /* Narrator ducking must never interrupt play. */ }
}

"""
          replace("function startAmbience(kind) {", duck + "function startAmbience(kind) {", 'ambience duck helper')

          old_narrator = """async function playNarratorSequence(ids, text, {delay = 350} = {}) {
  const fallbackMs = Math.max(900, String(text || '').trim().split(/\\s+/).filter(Boolean).length * 510);
  if (!voiceEnabled || (!ids?.length && !text)) {
    await sleep(Math.min(900, fallbackMs));
    return;
  }
  const context = unlockAudio(true);
  if (context && ids?.length && voicePackCovers(ids)) {
    stopNarration();
    const duration = await playVoicePack(context, ids, {delay, gap: .24, volume: 1});
    if (duration) {
      await sleep(duration + 180);
      return;
    }
  }
  stopVoicePack();
  const duration = await narrate(text, {delay, volume: 1});
  if (!duration) await sleep(Math.min(900, delay + fallbackMs));
}"""
          new_narrator = """async function playNarratorSequence(ids, text, {delay = 350} = {}) {
  const fallbackMs = Math.max(900, String(text || '').trim().split(/\\s+/).filter(Boolean).length * 510);
  setAmbienceDuck(true);
  try {
    if (!voiceEnabled || (!ids?.length && !text)) {
      await sleep(Math.min(900, fallbackMs));
      return;
    }
    const context = unlockAudio(true);
    if (context && ids?.length && voicePackCovers(ids)) {
      stopNarration();
      const duration = await playVoicePack(context, ids, {delay, gap: .24, volume: 1});
      if (duration) {
        await sleep(duration + 180);
        return;
      }
    }
    stopVoicePack();
    const duration = await narrate(text, {delay, volume: 1});
    if (!duration) await sleep(Math.min(900, delay + fallbackMs));
  } finally {
    setAmbienceDuck(false);
  }
}"""
          replace(old_narrator, new_narrator, 'narrator ambience ducking')

          replace("""      const opening = openingNarration(view);
      const delay = opening.ids?.[0] === 'nightfall' ? 2300 : phase === 'dawn' ? 650 : 350;
      await playNarratorSequence(opening.ids, opening.text, {delay});""", """      const opening = openingNarration(view);
      const phaseCueLead = {'setup-thief': 2100, 'setup-cupid': 2700, 'setup-lovers': 2500, 'night-seer': 2300, 'night-wolves': 4800, 'night-witch': 2700, 'sheriff-vote': 2100, 'day-vote': 1900, resolution: 2700};
      const deathReveal = (phase === 'dawn' || phase === 'day-result') && Boolean(view.lastDeaths?.length);
      const healedReveal = phase === 'dawn' && Boolean(view.nightResult?.healed) && !deathReveal;
      const delay = opening.ids?.[0] === 'nightfall' ? 2300 : deathReveal ? 4300 : healedReveal ? 3500 : phase === 'dawn' ? 850 : phaseCueLead[phase] || 350;
      await playNarratorSequence(opening.ids, opening.text, {delay});""", 'role cue narrator lead-in')

          app.write_text(text)

          engine = Path('src/engine.js')
          text = engine.read_text()

          def replace_engine(old, new, label):
              global text
              if old not in text:
                  raise SystemExit(f'Engine patch target not found: {label}')
              text = text.replace(old, new, 1)

          replace_engine("    lastDeaths: [],\n    lastVote: null,", "    lastDeaths: [],\n    nightResult: {healed: false, poisoned: false},\n    lastVote: null,", 'initial night result')
          replace_engine("  state.lastDeaths = [];\n  state.lastVote = null;\n  state.winner = null;", "  state.lastDeaths = [];\n  state.nightResult = {healed: false, poisoned: false};\n  state.lastVote = null;\n  state.winner = null;", 'start game night result')
          replace_engine("""  const deaths = [];
  if (victim && !state.actions.witchDraft.heal) deaths.push({id: victim, cause: state.actions.littleGirlCaught ? 'caught peeking' : 'the Werewolves'});""", """  const deaths = [];
  state.nightResult = {
    healed: Boolean(victim && state.actions.witchDraft.heal),
    poisoned: Boolean(state.actions.witchDraft.poisonTarget)
  };
  if (victim && !state.actions.witchDraft.heal) deaths.push({id: victim, cause: state.actions.littleGirlCaught ? 'caught peeking' : 'the Werewolves'});""", 'resolve night result')
          replace_engine("  state.lastDeaths = [];\n  state.lastVote = null;\n  state.winner = null;\n  for (const player", "  state.lastDeaths = [];\n  state.nightResult = {healed: false, poisoned: false};\n  state.lastVote = null;\n  state.winner = null;\n  for (const player", 'reset lobby night result')
          replace_engine("    lastDeaths: clone(state.lastDeaths),\n    lastVote: clone(state.lastVote),", "    lastDeaths: clone(state.lastDeaths),\n    nightResult: clone(state.nightResult || {healed: false, poisoned: false}),\n    lastVote: clone(state.lastVote),", 'view night result')
          engine.write_text(text)

          sw = Path('src/sw.js')
          sw_text = sw.read_text()
          if "const CACHE = 'moonfall-v11-canonical-audio';" not in sw_text:
              raise SystemExit('Service worker cache version target not found')
          sw.write_text(sw_text.replace("const CACHE = 'moonfall-v11-canonical-audio';", "const CACHE = 'moonfall-v12-role-audio';", 1))
          PY

      - name: Test and build polished game
        run: |
          npm ci
          npm test
          npm run build
          test -f dist/assets/voice/pack.json
          test -f dist/assets/ambience/pack.json
          test -f dist/assets/role-sfx/pack.json

      - name: Commit premium role SFX and audio polish to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/app.js src/engine.js src/sw.js assets/role-sfx role-sfx-generation-report.json
          git commit -m "Add varied premium role SFX and narrator ducking"
          git pull --rebase origin main
          git push
