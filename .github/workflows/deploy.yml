name: Deploy Moonfall to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      # The premium voice/ambience pack is generated once by the manual
      # "Generate premium audio" workflow and committed to the repo, so deploys
      # never spend ElevenLabs credits. This fallback only runs when no pack
      # has been committed yet, using the free keyless Edge voices.
      - name: Generate fallback voice pack (only when none is committed)
        run: |
          if [ -f assets/voice/pack.json ]; then
            echo "Committed voice pack found; skipping generation."
          else
            pip install --quiet edge-tts
            python scripts/generate_voice_pack.py \
              || echo "::warning::Voice pack generation failed; the game will fall back to on-device speech."
          fi
      - run: npm run build
      # Pages was first enabled with a branch source, which makes GitHub race
      # a Jekyll README build against this workflow on every push. Switch the
      # source to workflow deployments so only the built game is ever served.
      - name: Ensure Pages serves this workflow's deployments
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl -sf -X PUT \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/pages" \
            -d '{"build_type":"workflow"}' \
            && echo "Pages source is now GitHub Actions" \
            || echo "::warning::Could not switch the Pages source automatically. In Settings → Pages set Source to 'GitHub Actions'."
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      - id: deployment
        uses: actions/deploy-pages@v4
