name: Deploy Moonfall to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Generate narrator voice pack (free neural TTS)
        env:
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
        run: |
          pip install --quiet edge-tts
          python scripts/generate_voice_pack.py \
            || echo "::warning::Voice pack generation failed; the game will fall back to on-device speech."
      - run: npm run build
      - name: Publish dist to the gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          force_orphan: true
